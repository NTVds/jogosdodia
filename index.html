
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de M3U por Imagem</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}
.box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
display:inline-block;
}
button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Gerador de M3U de Jogos</h1>

<div class="box">

<form method="post" enctype="multipart/form-data">

<p>Selecione as imagens dos jogos</p>

<input type="file" name="images" multiple required>

<br><br>

<button type="submit">Gerar Lista M3U</button>

</form>

</div>

</body>
</html>
